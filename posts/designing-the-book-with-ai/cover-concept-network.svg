<svg xmlns="http://www.w3.org/2000/svg" width="600" height="900" viewBox="0 0 600 900" role="img" aria-label="Mastering Identus book cover concept, decentralized network theme">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b1f3a"/>
      <stop offset="0.55" stop-color="#0a1426"/>
      <stop offset="1" stop-color="#05080f"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.32" r="0.6">
      <stop offset="0" stop-color="#2bd1c4" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#2bd1c4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3ad0c8"/>
      <stop offset="1" stop-color="#6a8dff"/>
    </linearGradient>
  </defs>

  <rect width="600" height="900" fill="url(#bg)"/>
  <rect width="600" height="900" fill="url(#glow)"/>

  <!-- network edges -->
  <g stroke="url(#accent)" stroke-width="1.4" opacity="0.55">
    <line x1="120" y1="250" x2="300" y2="170"/>
    <line x1="300" y1="170" x2="470" y2="250"/>
    <line x1="120" y1="250" x2="220" y2="360"/>
    <line x1="470" y1="250" x2="390" y2="360"/>
    <line x1="220" y1="360" x2="300" y2="290"/>
    <line x1="300" y1="290" x2="390" y2="360"/>
    <line x1="300" y1="170" x2="300" y2="290"/>
    <line x1="220" y1="360" x2="390" y2="360"/>
    <line x1="120" y1="250" x2="80" y2="150"/>
    <line x1="470" y1="250" x2="520" y2="150"/>
  </g>

  <!-- network nodes -->
  <g fill="#0a1426" stroke="url(#accent)" stroke-width="2.4">
    <circle cx="300" cy="170" r="13"/>
    <circle cx="120" cy="250" r="10"/>
    <circle cx="470" cy="250" r="10"/>
    <circle cx="220" cy="360" r="9"/>
    <circle cx="390" cy="360" r="9"/>
    <circle cx="300" cy="290" r="11"/>
    <circle cx="80" cy="150" r="6"/>
    <circle cx="520" cy="150" r="6"/>
  </g>
  <circle cx="300" cy="170" r="4" fill="#7df5ea"/>

  <text x="300" y="470" text-anchor="middle" fill="#f4f7fb" font-family="Georgia, 'Times New Roman', serif" font-size="62" font-weight="700" letter-spacing="2">MASTERING</text>
  <text x="300" y="540" text-anchor="middle" fill="url(#accent)" font-family="Georgia, 'Times New Roman', serif" font-size="74" font-weight="700" letter-spacing="2">IDENTUS</text>

  <line x1="220" y1="582" x2="380" y2="582" stroke="#3ad0c8" stroke-width="2"/>

  <text x="300" y="630" text-anchor="middle" fill="#c4ccd8" font-family="Helvetica, Arial, sans-serif" font-size="22" letter-spacing="1">A Developer Handbook for</text>
  <text x="300" y="660" text-anchor="middle" fill="#c4ccd8" font-family="Helvetica, Arial, sans-serif" font-size="22" letter-spacing="1">Decentralized Identity</text>

  <text x="300" y="820" text-anchor="middle" fill="#8a94a6" font-family="Helvetica, Arial, sans-serif" font-size="20" letter-spacing="2">JON BAUER &amp; ROBERTO CARVAJAL</text>

  <text x="300" y="60" text-anchor="middle" fill="#4a5870" font-family="Helvetica, Arial, sans-serif" font-size="13" letter-spacing="4">DRAFT CONCEPT</text>
</svg>
